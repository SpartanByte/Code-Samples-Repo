# Manual deployment to production, only after staging is successful
# Required CI/CD variables = PROD_SSH_KEY, PROD_HOST, APP_KEY, PROD_DB_HOST
# Set these in Settings → CI/CD → Variables. Mark secrets (SSH keys, APP_KEY) as Masked and Protected.
deploy-prod:
  stage: deploy
  image: alpine:3
  needs: ["deploy-staging"]
  environment:
    name: production
    url: https://app.example.com
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$PROD_SSH_KEY" | ssh-add -
    - mkdir -p ~/.ssh
    - ssh-keyscan $PROD_HOST >> ~/.ssh/known_hosts
  script:
    - ssh deploy@$PROD_HOST "
        php artisan down --retry=60 &&
        docker pull $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA &&
        docker stop laravel-app || true &&
        docker run -d --rm --name laravel-app
          -e APP_ENV=production
          -e APP_KEY=$APP_KEY
          -e DB_HOST=$PROD_DB_HOST
          -p 9000:9000
          $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA &&
        docker exec laravel-app php artisan migrate --force &&
        docker exec laravel-app php artisan config:cache &&
        docker exec laravel-app php artisan route:cache &&
        docker exec laravel-app php artisan view:cache &&
        php artisan up"
  when: manual
  allow_failure: false
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH