# Required CI/CD variables = APP_KEY
# Set these in Settings → CI/CD → Variables. Mark secrets (SSH keys, APP_KEY) as Masked and Protected.
# This pipeline runs Rector in dry-run mode to check for potential code issues and deprecations. It allows failures so it won't block the pipeline, but it provides valuable feedback on code quality and
security-check:
  stage: security
  image: php:8.3-cli
  before_script:
    - curl -sS https://getcomposer.org/installer | php
    - php composer.phar install --no-interaction --prefer-dist
    - curl -L https://github.com/fabpot/local-php-security-checker/releases/download/v2.0.6/local-php-security-checker_linux_amd64
        -o security-checker
    - chmod +x security-checker
  script:
    - ./security-checker --format=json
  allow_failure: false